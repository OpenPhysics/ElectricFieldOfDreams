<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#1a1a2e" />

  <!-- Radiating electric-field arrows (point charge field) -->
  <g stroke="#7986a6" stroke-width="14" fill="none" stroke-linecap="round">
    <line x1="256" y1="176" x2="256" y2="96" />
    <line x1="256" y1="336" x2="256" y2="416" />
    <line x1="176" y1="256" x2="96" y2="256" />
    <line x1="336" y1="256" x2="416" y2="256" />
    <line x1="199" y1="199" x2="142" y2="142" />
    <line x1="313" y1="199" x2="370" y2="142" />
    <line x1="199" y1="313" x2="142" y2="370" />
    <line x1="313" y1="313" x2="370" y2="370" />
  </g>
  <g fill="#7986a6">
    <polygon points="256,80 244,108 268,108" />
    <polygon points="256,432 244,404 268,404" />
    <polygon points="80,256 108,244 108,268" />
    <polygon points="432,256 404,244 404,268" />
    <polygon points="130,130 168,142 142,168" />
    <polygon points="382,130 344,142 370,168" />
    <polygon points="130,382 142,344 168,370" />
    <polygon points="382,382 370,344 344,370" />
  </g>

  <!-- Central positive charge -->
  <circle cx="256" cy="256" r="60" fill="#21366b" stroke="#7986a6" stroke-width="10" />
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round">
    <line x1="256" y1="230" x2="256" y2="282" />
    <line x1="230" y1="256" x2="282" y2="256" />
  </g>
</svg>
